<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <form class="form-contato">

        <h2>Formulário de Contato</h2>

        <label for="nome">Nome:</label>
        <input type="text" id="nome" required minlength="3" placeholder="Digite seu nome">
        
        <label for="email">Email:</label>
        <input type="email" id="email">
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" pattern="[0-9]{10,11}" placeholder="Digite seu telefone (10 ou 11 dígitos)">
        
        <label for="assunto">Assunto:</label>
        <select id="assunto">
            <option value="">Selecione</option>
            <option value="duvida">Dúvida</option>
            <option value="sugestao">Sugestão</option>
            <option value="contato">Contato</option>
        </select>

        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" rows="4" required></textarea>
        
        <button type="submit">Enviar</button>
        <button type="button" onclick="document.getElementById('nome').value = 'Hello Yan!'">Click me!</button>
        <input type="submit" value="Enviar">

        <button id="btnAlerta">Mostrar alerta</button>
        <button id="btnCor">Mudar cor</button>
        <button id="btnConteudo">Mudar conteúdo</button>
        <p id="conteudo">Conteúdo original</p>

    </form>
    <script src="assets/js/script.js"></script>
</body>

</html>

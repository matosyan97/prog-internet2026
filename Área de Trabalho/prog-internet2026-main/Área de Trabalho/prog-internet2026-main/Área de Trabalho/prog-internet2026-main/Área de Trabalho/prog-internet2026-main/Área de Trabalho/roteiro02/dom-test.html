<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="titulo">Olá Mundo!</h1>
    <button onmousemove="mudarTexto()">Clique Aqui</button>

    <ul id="minhaLista"></ul>
    <button id="add">Adicionar Item</button>

    <h2 id="contador">0</h2>
    <button id="btnSoma">Contar +1</button>

    <img id="lampada"
        src="/Área de Trabalho/prog-internet2026-main/Área de Trabalho/prog-internet2026-main/Área de Trabalho/prog-internet2026-main/Área de Trabalho/roteiro02/assets/img/off.png"
        style="width:100px">
    <button id="btnInterruptor">Ligar/Desligar</button>

    <input type="number" id="palpite" placeholder="0 a 10">
    <button id="btnChutar">Chutar!</button>
    <p id="feedback"></p>

    <p>Erros: <span id="contadorErros">0</span></p>
    <button id="fugitivo" style="position: absolute; left: 50%; top: 50%;">
        Pegue-me!
    </button>

    <script>
        const lista = document.getElementById("minhaLista");
        const botao = document.getElementById("add");
        let valor = 0;
        const display = document.getElementById("contador");
        const btnSoma = document.getElementById("btnSoma");
        const img = document.getElementById("lampada");
        let acesa = false;
        const segredo = Math.floor(Math.random() * 11);
        const campo = document.getElementById("palpite");
        const texto = document.getElementById("feedback");
        const btnChutar = document.getElementById("btnChutar");
        const btn = document.getElementById("fugitivo");
        const placar = document.getElementById("contadorErros");
        let erros = 0;

        btn.addEventListener("mouseover", () => {
            erros++;
            placar.innerText = erros;
            // Mudar posição aleatoriamente
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.left = `${ x }px`;
            btn.style.top = `${ y }px`;
        });
        
        btn.addEventListener("click", () => alert(" Você me pegou!"));

        btnChutar.addEventListener("click", () => {
            const chute = Number(campo.value);
            if (chute === segredo) {
                texto.innerText = " Parabéns! Você acertou!";
                texto.style.color = "green";
            } else {
                texto.innerText = chute > segredo ? "Muito alto!" : "Muito baixo!";
                texto.style.color = "red";
            }
        });

        document.getElementById("btnInterruptor").addEventListener("click", () => {
            acesa = !acesa;
            img.src = acesa ? "/Área de Trabalho/prog-internet2026-main/Área de Trabalho/prog-internet2026-main/Área de Trabalho/prog-internet2026-main/Área de Trabalho/roteiro02/assets/img/on.png" : "/Área de Trabalho/prog-internet2026-main/Área de Trabalho/prog-internet2026-main/Área de Trabalho/prog-internet2026-main/Área de Trabalho/roteiro02/assets/img/off.png";
        });


        btnSoma.addEventListener("click", () => {
            valor++;
            display.innerText = valor;
        });

        botao.addEventListener("click", () => {

            // 1. Criar o elemento
            const novoItem = document.createElement("li");

            // 2. Dar conteúdo ao elemento
            novoItem.innerText = "Novo Item na Lista";

            // 3. Adicionar na página
            lista.appendChild(novoItem);
        });

        function mudarTexto() {
            const titulo = document.getElementById("titulo");
            titulo.innerText = "JavaScript funcionando!";
            titulo.style.color = "blue";
        }
    </script>
</body>

</html>
